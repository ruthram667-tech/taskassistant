version: '3.8'

networks:
  # Shared internal network for the stack
  taskassistant_net:
    driver: bridge
  # External network for your reverse proxy (Nginx Proxy Manager, Traefik, etc.)
  reverse_proxy_net:
    external: true 

services:
  app:
    # If deploying via Git in Portainer, it will build automatically.
    # Otherwise, you can point this to your pre-built image registry.
    build: 
      context: .
      dockerfile: Dockerfile
    image: taskassistant:latest
    container_name: taskassistant_app
    restart: unless-stopped
    ports:
      # Exposes the port dynamically based on .env, defaults to 3000
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
    volumes:
      # Bind mount for any persistent data generated by the app (e.g., logs, user uploads)
      # Adheres to your TrueNAS dataset path requirement
      - /mnt/Hdd/Hari/Projects/voice_assist/data:/app/data
    networks:
      - taskassistant_net
      - reverse_proxy_net
    healthcheck:
      # Pings an existing lightweight GET endpoint in your server.ts
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/email/logs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
